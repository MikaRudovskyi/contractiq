services:
  postgres:
    image: postgres:16-alpine
    container_name: contractiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: contractiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - contractiq_pgdata:/var/lib/postgresql/data

volumes:
  contractiq_pgdata:
